<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多語言學習隨身包</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="globalLoadingBanner"
        style="position:fixed; top:0; left:0; right:0; background:#2b6cb0; color:#fff; text-align:center; padding:6px 10px; font-size:13px; z-index:100000; font-weight:bold;">
        ⏳ 資料載入中，請稍候...</div>

    <div class="container">
        <h2 id="siteTitle" style="text-align: center; margin-top: 0; color: #2b6cb0;">🌍 多語言隨身包</h2>

        <div id="globalSearchWrap" style="margin-bottom: 18px;">
            <input type="text" id="globalSearchInput" placeholder="🔍 搜尋所有語言的字句、短文、寫作題目..."
                style="width:100%; padding:10px 14px; border:1px solid #cbd5e0; border-radius:20px; font-size:14px; box-sizing:border-box;">
            <div id="globalSearchResults" style="margin-top:10px;"></div>
        </div>

        <div id="page1" class="app-page active">
            <h3 class="page-title">🎯 請選擇你想學習的語言</h3>
            <div id="langGrid" class="lang-grid"></div>
            <div style="text-align: center; margin-top: 30px;">
                <button id="toPage2Btn" class="btn-primary" onclick="navigateToPage(2)">選好了，前往情境 ➡️</button>
            </div>
        </div>

        <div id="page2" class="app-page">
            <h3 class="page-title">🎯 請選擇你想學習的情境</h3>
            <div id="categoryContainer" class="category-grid"></div>
        </div>

        <div id="page3" class="app-page">
            <h3 class="page-title">⚡ 請選擇練習模式</h3>
            <div class="mode-selector" style="display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;">
                <button class="mode-btn active" data-mode="dialogue">🎴 字卡認識</button>
                <button class="mode-btn" data-mode="listening">🎧 聽力測驗</button>
                <button class="mode-btn" data-mode="cloze">⌨️ 智慧拼寫</button>
                <button class="mode-btn" data-mode="speaking">🗣️ 口語發音</button>
                <button class="mode-btn" data-mode="conjugation">✍️ 動詞特訓</button>
                <button class="mode-btn" data-mode="kana">🎌 五十音特訓</button>
                <button class="mode-btn" data-mode="writing">✍️ 寫作特訓</button>
            </div>

            <div id="mainContent" class="practice-zone"></div>
        </div>

        <div id="page4" class="app-page">
            <div class="live-dashboard">
                <div class="dashboard-header">
                    <span id="dashboardLocation">📰 推薦新聞網站導覽</span>
                    <span style="font-size: 13px; color: #718096;">點擊直接前往外部網站學習</span>
                </div>

                <div id="newsRegionTabs" class="news-tabs" style="display: none; margin-bottom: 15px;"></div>

                <div class="dashboard-news">
                    <ul id="newsLinkList" class="news-link-grid"></ul>
                </div>
            </div>

            <div class="live-dashboard" style="margin-top: 15px; border: 2px solid #d6bcfa;">
                <div class="dashboard-header" style="color: #805ad5;">
                    <span>🌟 我的私房新聞網站</span>
                    <span style="font-size: 13px; color: #718096;">在「引進庫」新增，類型選 📰 新聞網站</span>
                </div>
                <div class="dashboard-news">
                    <ul id="myLinksList" class="news-link-grid"></ul>
                </div>
            </div>
        </div>

        <div id="page5" class="app-page"></div>

        <div id="page6" class="app-page"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="navigateToPage(1)"><span>🌐</span>語系</button>
        <button class="nav-item" onclick="navigateToPage(2)"><span>🧳</span>情境</button>
        <button class="nav-item" onclick="navigateToPage(3)"><span>⚡</span>練習</button>
        <button class="nav-item" onclick="navigateToPage(4)"><span>📰</span>看板</button>
        <button class="nav-item" onclick="navigateToPage(5)"><span>📥</span>引進庫</button>
        <button class="nav-item" onclick="navigateToPage(6)"><span>🔗</span>學習網站</button>
    </div>

    <script src="https://unpkg.com/docx@8.2.4/build/index.js"></script>
    <script src="script.js"></script>
</body>

</html>
